<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex — AI Task Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── ROOT ── */
:root {
  --c1:#0f2027;--c2:#203a43;--c3:#2c5364;
  --accent:#00d4e8;--accent-dim:rgba(0,212,232,0.12);--accent-border:rgba(0,212,232,0.32);--accent-glow:rgba(0,212,232,0.18);
  --mode-color:#00d4e8;--mode-dim:rgba(0,212,232,0.12);--mode-border:rgba(0,212,232,0.32);
  --surface:rgba(32,58,67,0.6);--surface2:rgba(15,32,39,0.75);--surface3:rgba(44,83,100,0.45);
  --border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.15);
  --text:#e8f4f8;--text-muted:#5a8a99;--text-dim:#7aa8b8;
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.12);
  --green:#00e8a0;
  --sidebar-w:260px;--radius:12px;--radius-lg:18px;
}
[data-mode="study"] { --mode-color:#4f9fff; --mode-dim:rgba(79,159,255,0.12); --mode-border:rgba(79,159,255,0.32); --mode-glow:rgba(79,159,255,0.2); }
[data-mode="work"]  { --mode-color:#f0a030; --mode-dim:rgba(240,160,48,0.12);  --mode-border:rgba(240,160,48,0.32);  --mode-glow:rgba(240,160,48,0.2); }
[data-mode="life"]  { --mode-color:#00d4e8; --mode-dim:rgba(0,212,232,0.12);   --mode-border:rgba(0,212,232,0.32);   --mode-glow:rgba(0,212,232,0.18); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;height:100%;}
body{
  background:#0f2027;
  background-image:
    radial-gradient(ellipse 100% 80% at 15% -10%,rgba(100,200,220,0.18) 0%,transparent 50%),
    radial-gradient(ellipse 80% 60% at 85% 110%,rgba(44,83,100,0.9) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 50%,rgba(32,58,67,0.6) 0%,transparent 70%),
    linear-gradient(160deg,#0a1920 0%,#1a3340 35%,#234458 65%,#2c5364 100%);
  background-attachment:fixed;
  color:var(--text);font-family:'Orbitron',sans-serif;
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(255,255,255,0.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,212,232,0.05) 0%,transparent 50%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:55vh;background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 100%);pointer-events:none;z-index:0;}

/* ── APP SHELL ── */
#app{position:relative;z-index:1;display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:linear-gradient(180deg,rgba(10,25,32,0.92) 0%,rgba(15,32,39,0.88) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform 0.3s ease;
}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-logo{font-size:12px;font-weight:700;letter-spacing:0.28em;color:var(--mode-color);text-shadow:0 0 16px var(--mode-color);transition:color 0.3s,text-shadow 0.3s;cursor:pointer;}
.sidebar-logo:hover{opacity:0.8;}
.new-project-btn{width:28px;height:28px;background:linear-gradient(145deg,var(--mode-dim),transparent);border:1px solid var(--mode-border);border-radius:8px;color:var(--mode-color);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;line-height:1;}
.new-project-btn:hover{background:var(--mode-dim);box-shadow:0 0 12px var(--mode-border);}
.sidebar-section-label{font-size:8px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--text-muted);padding:16px 16px 8px;}
.project-list{flex:1;overflow-y:auto;padding:0 8px;}
.project-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;border:1px solid transparent;margin-bottom:3px;position:relative;}
.project-item:hover{background:var(--surface);}
.project-item.active{background:var(--mode-dim);border-color:var(--mode-border);box-shadow:0 2px 12px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.1);}
.project-mode-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.project-mode-dot[data-m="study"]{background:#4f9fff;color:#4f9fff;}
.project-mode-dot[data-m="work"]{background:#f0a030;color:#f0a030;}
.project-mode-dot[data-m="life"]{background:#00d4e8;color:#00d4e8;}
.project-info{flex:1;min-width:0;}
.project-name{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.project-item.active .project-name{color:var(--text);}
.project-meta{font-size:8px;color:var(--text-muted);letter-spacing:0.06em;margin-top:2px;}
.project-del{opacity:0;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 4px;transition:all 0.15s;border-radius:4px;}
.project-item:hover .project-del{opacity:1;}
.project-del:hover{color:var(--red);}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);}
.mode-pills{display:flex;gap:6px;}
.mode-pill{flex:1;padding:7px 0;border-radius:8px;border:1px solid var(--border);background:none;font-family:'Orbitron',sans-serif;font-size:7px;font-weight:600;letter-spacing:0.12em;color:var(--text-muted);cursor:pointer;transition:all 0.15s;text-transform:uppercase;text-align:center;}
.mode-pill:hover{border-color:var(--border-hi);color:var(--text);}
.mode-pill.active-study{background:rgba(79,159,255,0.15);border-color:rgba(79,159,255,0.4);color:#4f9fff;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);}
.mode-pill.active-work{background:rgba(240,160,48,0.15);border-color:rgba(240,160,48,0.4);color:#f0a030;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);}
.mode-pill.active-life{background:rgba(0,212,232,0.15);border-color:rgba(0,212,232,0.4);color:#00d4e8;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);}

/* ── MAIN ── */
#main{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(10,25,32,0.85),rgba(10,25,32,0.7));backdrop-filter:blur(16px);position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.menu-btn{display:none;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px;}
.topbar-project{font-size:13px;font-weight:700;letter-spacing:0.1em;color:var(--text);}
.topbar-mode-badge{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;letter-spacing:0.08em;border:1px solid var(--mode-border);color:var(--mode-color);background:var(--mode-dim);transition:all 0.3s;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.task-count-badge{font-family:'Exo 2',sans-serif;font-size:11px;color:var(--text-muted);}

/* ── CONTENT AREA ── */
.content{flex:1;padding:32px 28px 60px;max-width:820px;width:100%;}

/* ── NEW PROJECT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:linear-gradient(145deg,rgba(32,58,67,0.95),rgba(15,32,39,0.95));border:1px solid var(--border-hi);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);}
.modal-title{font-size:13px;font-weight:700;letter-spacing:0.16em;color:var(--text);margin-bottom:20px;text-transform:uppercase;}
.modal-label{font-size:8px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.modal-input{width:100%;background:linear-gradient(145deg,rgba(15,32,39,0.9),rgba(32,58,67,0.6));border:1px solid var(--border-hi);border-radius:var(--radius);padding:12px 16px;font-family:'Exo 2',sans-serif;font-size:14px;color:var(--text);outline:none;margin-bottom:18px;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:inset 0 2px 6px rgba(0,0,0,0.25);}
.modal-input:focus{border-color:var(--mode-border);box-shadow:inset 0 2px 6px rgba(0,0,0,0.25),0 0 0 2px var(--mode-dim);}
.modal-input::placeholder{color:var(--text-muted);}
.mode-select{display:flex;gap:8px;margin-bottom:24px;}
.mode-select-btn{flex:1;padding:10px 0;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);font-family:'Orbitron',sans-serif;font-size:8px;font-weight:600;letter-spacing:0.14em;color:var(--text-muted);cursor:pointer;transition:all 0.15s;text-transform:uppercase;text-align:center;}
.mode-select-btn:hover{border-color:var(--border-hi);color:var(--text);}
.mode-select-btn.sel-study{background:rgba(79,159,255,0.18);border-color:rgba(79,159,255,0.45);color:#4f9fff;box-shadow:0 0 14px rgba(79,159,255,0.15),inset 0 1px 0 rgba(255,255,255,0.12);}
.mode-select-btn.sel-work{background:rgba(240,160,48,0.18);border-color:rgba(240,160,48,0.45);color:#f0a030;box-shadow:0 0 14px rgba(240,160,48,0.15),inset 0 1px 0 rgba(255,255,255,0.12);}
.mode-select-btn.sel-life{background:rgba(0,212,232,0.18);border-color:rgba(0,212,232,0.45);color:#00d4e8;box-shadow:0 0 14px rgba(0,212,232,0.15),inset 0 1px 0 rgba(255,255,255,0.12);}
.modal-actions{display:flex;gap:10px;}
.modal-cancel{flex:1;padding:11px;background:none;border:1px solid var(--border);border-radius:var(--radius);font-family:'Orbitron',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.14em;color:var(--text-muted);cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.modal-cancel:hover{border-color:var(--border-hi);color:var(--text);}
.modal-create{flex:2;padding:11px;background:linear-gradient(145deg,var(--mode-color),color-mix(in srgb,var(--mode-color) 70%,#000));border:none;border-radius:var(--radius);font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.16em;color:#0a1920;cursor:pointer;transition:all 0.15s;text-transform:uppercase;box-shadow:0 4px 16px var(--mode-dim),inset 0 1px 0 rgba(255,255,255,0.3);}
.modal-create:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--mode-dim);}

/* ── INPUT ZONE ── */
.input-zone{background:linear-gradient(145deg,rgba(44,83,100,0.65) 0%,rgba(32,58,67,0.45) 100%);backdrop-filter:blur(20px);border:1px solid var(--mode-border);border-radius:var(--radius-lg);padding:22px;margin-bottom:36px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.1);transition:border-color 0.3s;}
.input-zone::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--mode-color),transparent);opacity:0.6;}
.input-label{font-size:9px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
textarea{width:100%;background:linear-gradient(145deg,rgba(15,32,39,0.9),rgba(32,58,67,0.55));border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:14px 16px;font-family:'Exo 2',sans-serif;font-size:15px;color:var(--text);resize:none;min-height:80px;line-height:1.7;letter-spacing:0.02em;transition:border-color 0.2s,box-shadow 0.2s;outline:none;box-shadow:inset 0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);}
textarea::placeholder{color:var(--text-muted);}
textarea:focus{border-color:var(--mode-border);box-shadow:inset 0 2px 8px rgba(0,0,0,0.3),0 0 0 2px var(--mode-dim);}
.input-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;}
.input-hint{font-family:'Exo 2',sans-serif;font-size:11px;color:var(--text-muted);}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(145deg,var(--mode-color),color-mix(in srgb,var(--mode-color) 75%,#000 25%));color:#0a1920;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.18em;padding:12px 24px;border:none;border-radius:var(--radius);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;white-space:nowrap;box-shadow:0 4px 20px var(--mode-dim),inset 0 1px 0 rgba(255,255,255,0.3);text-transform:uppercase;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.22),transparent);pointer-events:none;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--mode-dim);}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none;}
.spinner{width:13px;height:13px;border:2px solid rgba(10,26,32,0.25);border-top-color:#0a1920;border-radius:50%;animation:spin 0.65s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-bar{background:var(--red-dim);border:1px solid rgba(255,107,107,0.25);border-radius:var(--radius);padding:11px 15px;font-family:'Exo 2',sans-serif;font-size:13px;color:var(--red);margin-bottom:20px;display:none;}

/* ── TOP TASK CARD ── */
.top-card{background:linear-gradient(145deg,rgba(0,0,0,0.0) 0%,rgba(0,0,0,0.0) 100%);border:1px solid var(--mode-border);border-radius:var(--radius-lg);padding:22px 26px;margin-bottom:36px;display:none;position:relative;overflow:hidden;animation:fadeUp 0.4s ease;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.1);transition:border-color 0.3s;}
.top-card::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,var(--mode-dim),transparent 60%);pointer-events:none;}
.top-card::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent);pointer-events:none;}
.top-eyebrow{font-size:8px;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;color:var(--mode-color);margin-bottom:10px;display:flex;align-items:center;gap:8px;position:relative;}
.pulse{width:7px;height:7px;background:var(--mode-color);border-radius:50%;animation:pulse 2s ease infinite;box-shadow:0 0 10px var(--mode-color);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.6);}}
.top-task-name{font-size:20px;font-weight:700;letter-spacing:0.04em;color:var(--text);margin-bottom:8px;line-height:1.25;position:relative;}
.top-task-reason{font-family:'Exo 2',sans-serif;font-size:14px;color:var(--text-dim);line-height:1.65;margin-bottom:14px;position:relative;}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(145deg,var(--mode-dim),transparent);border:1px solid var(--mode-border);color:var(--mode-color);font-family:'Orbitron',sans-serif;font-size:8px;font-weight:600;letter-spacing:0.16em;padding:9px 18px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);}
.btn-ghost:hover{background:var(--mode-dim);transform:translateY(-1px);}

/* ── TASK LIST ── */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.list-title{font-size:8px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-muted);}
.clear-btn{font-size:8px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s;}
.clear-btn:hover{color:var(--red);}
.task-list{display:flex;flex-direction:column;gap:8px;}
.task-item{background:linear-gradient(145deg,rgba(44,83,100,0.55),rgba(32,58,67,0.38));backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.09);border-radius:var(--radius);animation:fadeUp 0.3s ease both;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:0 4px 14px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.08);}
.task-item:hover{border-color:var(--mode-border);box-shadow:0 6px 20px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.1);}
.task-item.rank-1{background:linear-gradient(145deg,var(--mode-dim),rgba(32,58,67,0.35));border-color:var(--mode-border);box-shadow:0 4px 20px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.12);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.task-main{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;}
.task-num{font-size:9px;font-weight:500;color:var(--text-muted);min-width:20px;text-align:right;}
.task-item.rank-1 .task-num{color:var(--mode-color);}
.task-body{flex:1;min-width:0;}
.task-name{font-family:'Exo 2',sans-serif;font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;letter-spacing:0.02em;}
.task-bars{display:flex;gap:5px;align-items:center;}
.bar-group{display:flex;align-items:center;gap:4px;}
.bar-label{font-size:7px;font-weight:600;color:var(--text-muted);}
.mini-bar{width:32px;height:3px;background:rgba(0,0,0,0.3);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);}
.mini-fill{height:100%;border-radius:99px;transition:width 0.4s ease;position:relative;}
.mini-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.35);border-radius:99px;}
.fill-u{background:linear-gradient(90deg,color-mix(in srgb,var(--mode-color) 80%,#000),var(--mode-color));}
.fill-i{background:linear-gradient(90deg,color-mix(in srgb,var(--mode-color) 50%,#fff),color-mix(in srgb,var(--mode-color) 70%,#fff));}
.fill-e{background:linear-gradient(90deg,#cc4444,#ff6b6b);}
.task-score{font-size:11px;font-weight:700;color:var(--mode-color);min-width:28px;text-align:right;text-shadow:0 0 10px var(--mode-color);}
.task-actions{display:flex;gap:6px;align-items:center;}
.expand-btn{background:linear-gradient(145deg,rgba(44,83,100,0.7),rgba(32,58,67,0.5));border:1px solid var(--mode-border);color:var(--mode-color);font-family:'Orbitron',sans-serif;font-size:7px;font-weight:600;letter-spacing:0.1em;padding:5px 9px;border-radius:6px;cursor:pointer;transition:all 0.15s;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);}
.expand-btn:hover{background:var(--mode-dim);}
.open-btn{background:linear-gradient(145deg,var(--mode-color),color-mix(in srgb,var(--mode-color) 75%,#000));color:#0a1920;font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;letter-spacing:0.1em;padding:5px 9px;border-radius:6px;border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;box-shadow:0 2px 10px var(--mode-dim),inset 0 1px 0 rgba(255,255,255,0.25);position:relative;overflow:hidden;}
.open-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.22),transparent);pointer-events:none;}
.open-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px var(--mode-dim);}
.task-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;line-height:1;padding:0 2px;transition:color 0.15s;}
.task-del:hover{color:var(--red);}

/* ── INLINE EXPAND ── */
.task-expand{display:none;border-top:1px solid rgba(255,255,255,0.06);padding:14px 16px 16px 50px;animation:fadeUp 0.22s ease;}
.task-expand.open{display:block;}
.expand-loading{font-family:'Exo 2',sans-serif;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:8px;}
.expand-label{font-size:7px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--mode-color);margin-bottom:7px;}
.expand-steps{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.expand-steps li{display:flex;align-items:flex-start;gap:7px;font-family:'Exo 2',sans-serif;font-size:12px;color:var(--text-dim);line-height:1.5;}
.expand-steps li::before{content:'›';color:var(--mode-color);font-size:13px;flex-shrink:0;}
.time-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface3);border:1px solid var(--mode-border);border-radius:8px;padding:5px 11px;font-family:'Exo 2',sans-serif;font-size:12px;color:var(--text-dim);margin-bottom:12px;}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:60px 0 40px;display:none;}
.empty-icon{font-size:28px;margin-bottom:14px;opacity:0.16;color:var(--mode-color);}
.empty-text{font-family:'Exo 2',sans-serif;font-size:14px;color:var(--text-muted);line-height:1.7;}

/* ── TASK DETAIL VIEW ── */
#taskView{display:none;position:fixed;inset:0;z-index:150;overflow-y:auto;
  background:#0f2027;
  background-image:
    radial-gradient(ellipse 100% 80% at 15% -10%,rgba(100,200,220,0.18) 0%,transparent 50%),
    linear-gradient(160deg,#0a1920 0%,#1a3340 35%,#234458 65%,#2c5364 100%);
}
.tp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(10,25,32,0.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:10;box-shadow:0 2px 16px rgba(0,0,0,0.3);}
.tp-logo{font-size:11px;font-weight:700;letter-spacing:0.28em;color:var(--mode-color);text-shadow:0 0 16px var(--mode-color);cursor:pointer;transition:opacity 0.15s;}
.tp-logo:hover{opacity:0.75;}
.tp-back{display:flex;align-items:center;gap:8px;background:linear-gradient(145deg,var(--mode-dim),transparent);border:1px solid var(--mode-border);color:var(--mode-color);font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.14em;padding:10px 20px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);position:relative;overflow:hidden;}
.tp-back::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.1),transparent);pointer-events:none;}
.tp-back:hover{background:var(--mode-dim);transform:translateY(-1px);}
.tp-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 61px);}
.tp-sidebar{background:rgba(10,25,32,0.6);border-right:1px solid var(--border);padding:20px 14px;overflow-y:auto;}
.tp-sidebar-label{font-size:7px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;padding:0 6px;}
.tp-task-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;border:1px solid transparent;margin-bottom:3px;}
.tp-task-item:hover{background:var(--surface);}
.tp-task-item.active{background:var(--mode-dim);border-color:var(--mode-border);}
.tp-task-item-num{font-size:8px;color:var(--text-muted);min-width:14px;}
.tp-task-item.active .tp-task-item-num{color:var(--mode-color);}
.tp-task-item-name{font-family:'Exo 2',sans-serif;font-size:11px;color:var(--text-dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-task-item.active .tp-task-item-name{color:var(--text);}
.tp-task-item-score{font-size:8px;color:var(--mode-color);}
.tp-main{padding:28px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
.tp-task-title-row{margin-bottom:6px;}
.tp-eyebrow{font-size:8px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--mode-color);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.tp-task-title{font-size:clamp(20px,2.8vw,30px);font-weight:700;letter-spacing:0.03em;color:var(--text);margin-bottom:14px;line-height:1.2;}
.tp-badges{display:flex;gap:10px;flex-wrap:wrap;}
.tp-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(145deg,rgba(44,83,100,0.65),rgba(32,58,67,0.45));border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:5px 11px;font-family:'Exo 2',sans-serif;font-size:11px;color:var(--text-dim);box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);}
.tp-badge span{color:var(--mode-color);font-weight:600;}
.cached-badge{cursor:pointer;border-color:rgba(0,232,160,0.28);color:var(--green);}
.cached-badge:hover{background:rgba(0,232,160,0.1);}
.tp-card{background:linear-gradient(145deg,rgba(44,83,100,0.6),rgba(32,58,67,0.42));backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.09);border-radius:var(--radius-lg);padding:22px;position:relative;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.09);}
.tp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);}
.tp-card-label{font-size:8px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--mode-color);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.tp-card-label::before{content:'';width:16px;height:1px;background:var(--mode-color);opacity:0.5;}
.tp-loading{display:flex;align-items:center;gap:10px;font-family:'Exo 2',sans-serif;font-size:13px;color:var(--text-muted);}
.progress-wrap{background:rgba(0,0,0,0.3);border-radius:99px;height:7px;margin-bottom:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.05);box-shadow:inset 0 2px 4px rgba(0,0,0,0.4);}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,color-mix(in srgb,var(--mode-color) 70%,#000),var(--mode-color),color-mix(in srgb,var(--mode-color) 60%,#fff));transition:width 0.5s ease;position:relative;box-shadow:0 0 10px var(--mode-color);}
.progress-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.4),transparent);border-radius:99px;}
.progress-text{font-family:'Exo 2',sans-serif;font-size:12px;color:var(--text-dim);margin-bottom:14px;}
.checklist{display:flex;flex-direction:column;gap:7px;}
.check-item{display:flex;align-items:flex-start;gap:11px;padding:10px 13px;background:linear-gradient(145deg,rgba(15,32,39,0.8),rgba(32,58,67,0.5));border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);cursor:pointer;transition:all 0.18s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);}
.check-item:hover{border-color:var(--mode-border);}
.check-item.done{opacity:0.45;}
.check-item.done .check-text{text-decoration:line-through;}
.check-box{width:17px;height:17px;border-radius:4px;border:1px solid var(--mode-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s;margin-top:1px;background:rgba(15,32,39,0.5);}
.check-item.done .check-box{background:linear-gradient(145deg,var(--mode-color),color-mix(in srgb,var(--mode-color) 75%,#000));border-color:var(--mode-color);box-shadow:0 0 10px var(--mode-dim);}
.check-tick{font-size:10px;color:#0a1920;display:none;}
.check-item.done .check-tick{display:block;}
.check-text{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--text);line-height:1.5;}
.add-check{display:flex;gap:7px;margin-top:9px;}
.add-check input{flex:1;background:linear-gradient(145deg,rgba(15,32,39,0.9),rgba(32,58,67,0.55));border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:9px 13px;font-family:'Exo 2',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s;box-shadow:inset 0 2px 5px rgba(0,0,0,0.2);}
.add-check input:focus{border-color:var(--mode-border);}
.add-check input::placeholder{color:var(--text-muted);}
.add-check-btn{background:var(--mode-dim);border:1px solid var(--mode-border);color:var(--mode-color);font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:0.1em;padding:9px 14px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);}
.add-check-btn:hover{background:linear-gradient(145deg,var(--mode-color),color-mix(in srgb,var(--mode-color) 75%,#000));color:#0a1920;}
.plan-steps{display:flex;flex-direction:column;}
.plan-step{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.plan-step:last-child{border-bottom:none;}
.step-num{width:30px;height:30px;border-radius:50%;border:1px solid var(--mode-border);background:linear-gradient(145deg,var(--mode-dim),transparent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--mode-color);flex-shrink:0;box-shadow:0 0 10px var(--mode-dim),inset 0 1px 0 rgba(255,255,255,0.1);}
.step-title{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.step-desc{font-family:'Exo 2',sans-serif;font-size:11px;color:var(--text-dim);line-height:1.6;}
.step-time{font-size:8px;color:var(--mode-color);letter-spacing:0.1em;margin-top:4px;font-weight:500;}

/* ── CONTEXT QUESTIONS ── */
.ctx-wrap{display:flex;flex-direction:column;gap:24px;}
.ctx-intro{font-family:'Exo 2',sans-serif;font-size:14px;color:var(--text-dim);line-height:1.7;}
.ctx-q-label{font-size:7px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--mode-color);margin-bottom:5px;}
.ctx-q-text{font-family:'Exo 2',sans-serif;font-size:14px;color:var(--text);margin-bottom:10px;}
.ctx-options{display:flex;flex-wrap:wrap;gap:8px;}
.ctx-option{font-family:'Exo 2',sans-serif;font-size:13px;color:var(--text-dim);background:linear-gradient(145deg,rgba(15,32,39,0.85),rgba(32,58,67,0.55));border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:9px 16px;cursor:pointer;transition:all 0.15s;user-select:none;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);}
.ctx-option:hover{border-color:var(--mode-border);color:var(--text);}
.ctx-option.selected{background:var(--mode-dim);border-color:var(--mode-border);color:var(--mode-color);box-shadow:0 3px 14px var(--mode-dim),inset 0 1px 0 rgba(255,255,255,0.12);}
.ctx-other-input{margin-top:9px;width:100%;background:linear-gradient(145deg,rgba(15,32,39,0.9),rgba(32,58,67,0.55));border:1px solid var(--mode-border);border-radius:var(--radius);padding:9px 14px;font-family:'Exo 2',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:inset 0 2px 5px rgba(0,0,0,0.2);}
.ctx-other-input:focus{box-shadow:inset 0 2px 5px rgba(0,0,0,0.2),0 0 0 2px var(--mode-dim);}
.ctx-other-input::placeholder{color:var(--text-muted);}

/* ── MOBILE ── */
@media(max-width:768px){
  :root{--sidebar-w:0px;}
  #sidebar{transform:translateX(-260px);width:260px;}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  .menu-btn{display:block;}
  .content{padding:20px 16px 100px;}
  .topbar{padding:12px 16px;}
  .tp-layout{grid-template-columns:1fr;}
  .tp-sidebar{display:none;}
  .tp-main{padding:20px 16px 80px;}
  .task-actions{gap:4px;}
  .expand-btn{display:none;}
  .topbar-project{font-size:11px;}
  #sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:none;}
  #sidebar-overlay.open{display:block;}
}
@media(max-width:480px){
  .top-task-name{font-size:17px;}
  h1{font-size:28px;}
  .task-name{font-size:13px;}
}
</style>
</head>
<body>
<div id="app" data-mode="life">

  <!-- ── SIDEBAR ── -->
  <div id="sidebarOverlay" onclick="closeSidebar()"></div>
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo" onclick="closeSidebar()">APEX · AI</div>
      <button class="new-project-btn" onclick="openModal()" title="New project">+</button>
    </div>
    <div class="sidebar-section-label">// projects</div>
    <div class="project-list" id="projectList"></div>
    <div class="sidebar-footer">
      <div class="mode-pills" id="modePills">
        <button class="mode-pill" data-mode="study" onclick="setProjectMode('study')">Study</button>
        <button class="mode-pill" data-mode="work" onclick="setProjectMode('work')">Work</button>
        <button class="mode-pill" data-mode="life" onclick="setProjectMode('life')">Life</button>
      </div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div id="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="openSidebar()">☰</button>
        <span class="topbar-project" id="topbarProject">Project</span>
        <span class="topbar-mode-badge" id="topbarMode">Life</span>
      </div>
      <div class="topbar-right">
        <span class="task-count-badge" id="taskCountBadge"></span>
      </div>
    </div>

    <div class="content" id="homeContent">
      <div class="input-zone">
        <div class="input-label">// enter your tasks</div>
        <textarea id="taskInput" rows="3" placeholder="e.g. Study for math test Friday, finish client deck, call dentist…"></textarea>
        <div class="input-actions">
          <span class="input-hint">↵ enter or click →</span>
          <button class="btn-primary" id="addBtn" onclick="addTasks()">
            <span id="btnText">Prioritize</span>
            <span id="btnArrow">↗</span>
          </button>
        </div>
      </div>

      <div class="error-bar" id="errorBar"></div>

      <div class="top-card" id="topCard">
        <div class="top-eyebrow"><span class="pulse"></span> Do this next</div>
        <div class="top-task-name" id="topTaskName"></div>
        <div class="top-task-reason" id="topTaskReason"></div>
        <button class="btn-ghost" onclick="openTaskPage(0)">Open full plan ↗</button>
      </div>

      <div id="taskSection" style="display:none">
        <div class="list-header">
          <span class="list-title">// priority queue</span>
          <button class="clear-btn" onclick="clearAll()">clear all</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◎</div>
        <div class="empty-text" id="emptyText">No tasks yet.<br>Add something above.</div>
      </div>
    </div>
  </div>

  <!-- ── TASK DETAIL VIEW ── -->
  <div id="taskView">
    <div class="tp-header">
      <div class="tp-logo" onclick="closeTaskPage()">APEX · AI</div>
      <button class="tp-back" onclick="closeTaskPage()">← Back to project</button>
    </div>
    <div class="tp-layout">
      <div class="tp-sidebar" id="tpSidebar"></div>
      <div class="tp-main" id="tpMain"></div>
    </div>
  </div>

</div>

<!-- ── NEW PROJECT MODAL ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">New project</div>
    <div class="modal-label">Project name</div>
    <input class="modal-input" id="modalName" type="text" placeholder="e.g. Finals Week, Q2 Launch, Personal Goals…" onkeydown="if(event.key==='Enter')createProject()"/>
    <div class="modal-label">Mode</div>
    <div class="mode-select" id="modeSelect">
      <button class="mode-select-btn sel-study" data-m="study" onclick="selectModalMode('study')">Study</button>
      <button class="mode-select-btn" data-m="work" onclick="selectModalMode('work')">Work</button>
      <button class="mode-select-btn" data-m="life" onclick="selectModalMode('life')">Life</button>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-create" id="modalCreate" onclick="createProject()">Create project ↗</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let projects = [];
let activeProjectId = null;
let modalMode = 'study';

function loadState() {
  try { projects = JSON.parse(localStorage.getItem('apex_projects') || '[]'); } catch(e) { projects = []; }
  activeProjectId = localStorage.getItem('apex_active_project');
  if (!projects.length) createDefaultProjects();
  if (!projects.find(p => p.id === activeProjectId)) activeProjectId = projects[0]?.id;
}

function saveState() {
  localStorage.setItem('apex_projects', JSON.stringify(projects));
  localStorage.setItem('apex_active_project', activeProjectId || '');
}

function createDefaultProjects() {
  projects = [
    { id: uid(), name: 'My Studies', mode: 'study', tasks: [], created: Date.now() },
    { id: uid(), name: 'Work Tasks', mode: 'work', tasks: [], created: Date.now() },
    { id: uid(), name: 'Life', mode: 'life', tasks: [], created: Date.now() },
  ];
  activeProjectId = projects[0].id;
  saveState();
}

function uid() { return Math.random().toString(36).slice(2, 10); }
function getProject(id) { return projects.find(p => p.id === (id || activeProjectId)); }
function getTasks() { return getProject()?.tasks || []; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── CACHE ──
function cacheKey(projectId, taskName) {
  return `apex_ctx:${projectId}:${taskName.trim().toLowerCase().slice(0,100)}`;
}
function loadCached(taskName) {
  try { return JSON.parse(localStorage.getItem(cacheKey(activeProjectId, taskName)) || 'null'); } catch(e) { return null; }
}
function saveCache(taskName, data) {
  try { localStorage.setItem(cacheKey(activeProjectId, taskName), JSON.stringify(data)); } catch(e) {}
}
function clearCache(taskName) {
  localStorage.removeItem(cacheKey(activeProjectId, taskName));
}

// ── MODE COLORS ──
function applyMode(mode) {
  document.getElementById('app').dataset.mode = mode;
  const labels = { study: 'Study', work: 'Work', life: 'Life' };
  const badge = document.getElementById('topbarMode');
  if (badge) badge.textContent = labels[mode] || mode;
  document.querySelectorAll('.mode-pill').forEach(p => {
    p.className = 'mode-pill' + (p.dataset.mode === mode ? ` active-${mode}` : '');
  });
  const ph = { study:'e.g. Study for biology exam Friday, finish essay, practice problems…', work:'e.g. Prep client deck, send invoices, fix staging bug…', life:'e.g. Book dentist appointment, call mum, renew passport…' };
  const ta = document.getElementById('taskInput');
  if (ta) ta.placeholder = ph[mode] || ph.life;
  const emptyMsgs = { study:'No tasks yet.\nAdd a study task above.', work:'No tasks yet.\nAdd a work task above.', life:'No tasks yet.\nAdd a task above.' };
  const et = document.getElementById('emptyText');
  if (et) et.textContent = emptyMsgs[mode] || emptyMsgs.life;
}

function setProjectMode(mode) {
  const p = getProject();
  if (!p) return;
  p.mode = mode;
  saveState();
  applyMode(mode);
  renderSidebar();
}

// ── PROJECT UI ──
function renderSidebar() {
  const list = document.getElementById('projectList');
  if (!list) return;
  list.innerHTML = projects.map(p => {
    const taskCount = p.tasks.length;
    return `<div class="project-item${p.id === activeProjectId ? ' active' : ''}" onclick="switchProject('${p.id}')">
      <div class="project-mode-dot" data-m="${p.mode}"></div>
      <div class="project-info">
        <div class="project-name">${esc(p.name)}</div>
        <div class="project-meta">${taskCount} task${taskCount !== 1 ? 's' : ''} · ${p.mode}</div>
      </div>
      ${projects.length > 1 ? `<button class="project-del" onclick="event.stopPropagation();deleteProject('${p.id}')" title="Delete">×</button>` : ''}
    </div>`;
  }).join('');
}

function switchProject(id) {
  activeProjectId = id;
  saveState();
  const p = getProject();
  applyMode(p?.mode || 'life');
  document.getElementById('topbarProject').textContent = p?.name || '';
  renderSidebar();
  render();
  closeSidebar();
}

function deleteProject(id) {
  if (projects.length <= 1) return;
  projects = projects.filter(p => p.id !== id);
  if (activeProjectId === id) activeProjectId = projects[0].id;
  saveState();
  switchProject(activeProjectId);
}

// ── MODAL ──
function openModal() {
  modalMode = getProject()?.mode || 'study';
  document.getElementById('modalName').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('app').dataset.mode = modalMode;
  updateModalModeButtons();
  setTimeout(() => document.getElementById('modalName').focus(), 50);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); applyMode(getProject()?.mode || 'life'); }
function selectModalMode(m) { modalMode = m; document.getElementById('app').dataset.mode = m; updateModalModeButtons(); }
function updateModalModeButtons() {
  document.querySelectorAll('.mode-select-btn').forEach(b => {
    b.className = 'mode-select-btn' + (b.dataset.m === modalMode ? ` sel-${modalMode}` : '');
  });
}
function createProject() {
  const name = document.getElementById('modalName').value.trim();
  if (!name) return;
  const p = { id: uid(), name, mode: modalMode, tasks: [], created: Date.now() };
  projects.push(p);
  saveState();
  closeModal();
  switchProject(p.id);
}

// ── SIDEBAR MOBILE ──
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

// ── AI ──
async function callAI(prompt, maxTokens = 1200) {
  const res = await fetch('/.netlify/functions/ai', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: maxTokens, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data.content.map(i => i.text || '').join('');
}

// ── TASK MANAGEMENT ──
function showError(msg) { const el = document.getElementById('errorBar'); el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
function setLoading(on) {
  const btn = document.getElementById('addBtn');
  document.getElementById('btnText').textContent = on ? 'Analyzing' : 'Prioritize';
  document.getElementById('btnArrow').innerHTML = on ? '<span class="spinner"></span>' : '↗';
  btn.disabled = on;
}

async function addTasks() {
  const input = document.getElementById('taskInput');
  const raw = input.value.trim();
  if (!raw) return;
  const p = getProject();
  if (!p) return;
  setLoading(true); showError('');
  try {
    const mode = p.mode;
    const modeCtx = { study: 'academic/studying context. Urgency = exam/deadline proximity. Impact = grade/learning importance.', work: 'professional work context. Urgency = client/deadline pressure. Impact = business/career importance.', life: 'personal life context. Urgency = time-sensitivity. Impact = life quality importance.' };
    const prompt = `You are a task prioritization AI. Mode: ${modeCtx[mode]}
User input: "${raw}"
Extract each task. Score: urgency (1-100, deadlines = higher), impact (1-100), effort (1-100).
priority_score = (urgency*0.5)+(impact*0.35)-(effort*0.15)
Return ONLY valid JSON array, no markdown:
[{"name":"task","urgency":80,"impact":70,"effort":40,"priority_score":79,"reason":"one sentence"}]`;
    const text = await callAI(prompt);
    const clean = text.replace(/```json|```/g,'').trim();
    const newTasks = JSON.parse(clean).map(t => ({ ...t, id: uid() }));
    p.tasks = [...p.tasks, ...newTasks].sort((a,b) => b.priority_score - a.priority_score);
    saveState();
    input.value = '';
    render();
  } catch(e) { showError('Could not reach AI. Check your connection and try again.'); }
  finally { setLoading(false); }
}

function deleteTask(taskId, e) {
  e.stopPropagation();
  const p = getProject();
  if (!p) return;
  clearCache(p.tasks.find(t => t.id === taskId)?.name || '');
  p.tasks = p.tasks.filter(t => t.id !== taskId);
  saveState(); render();
}

function clearAll() {
  const p = getProject();
  if (!p || !p.tasks.length) return;
  p.tasks.forEach(t => clearCache(t.name));
  p.tasks = [];
  saveState(); render();
}

function toggleExpand(taskId) {
  const el = document.getElementById(`expand-${taskId}`);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.task-expand').forEach(e => e.classList.remove('open'));
  if (!isOpen) { el.classList.add('open'); if (!el.dataset.loaded) loadInlineExpand(taskId, el); }
}

async function loadInlineExpand(taskId, el) {
  el.dataset.loaded = '1';
  el.innerHTML = `<div class="expand-loading"><span class="spinner"></span> Generating context…</div>`;
  const t = getProject()?.tasks.find(t => t.id === taskId);
  if (!t) return;
  try {
    const prompt = `Task: "${t.name}". Return ONLY valid JSON, no markdown:
{"time_estimate":"e.g. 2h","schedule_tip":"one sentence","quick_steps":["step 1","step 2","step 3","step 4"]}`;
    const text = await callAI(prompt, 600);
    const d = JSON.parse(text.replace(/```json|```/g,'').trim());
    el.innerHTML = `
      <div class="time-badge">⏱ ${esc(d.time_estimate)} · ${esc(d.schedule_tip)}</div>
      <div class="expand-label">Quick steps</div>
      <ul class="expand-steps">${d.quick_steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ul>
      <button class="open-btn" onclick="event.stopPropagation();openTaskPage('${taskId}')">Open full plan ↗</button>`;
  } catch(e) { el.innerHTML = `<div class="expand-loading" style="color:var(--red)">Failed to load.</div>`; }
}

function render() {
  const p = getProject();
  const tasks = p?.tasks || [];
  const topCard = document.getElementById('topCard');
  const taskSection = document.getElementById('taskSection');
  const emptyState = document.getElementById('emptyState');
  const taskList = document.getElementById('taskList');
  const taskCount = document.getElementById('taskCountBadge');
  if (taskCount) taskCount.textContent = tasks.length ? `${tasks.length} task${tasks.length !== 1 ? 's' : ''}` : '';
  document.getElementById('topbarProject').textContent = p?.name || '';
  if (!tasks.length) { topCard.style.display='none'; taskSection.style.display='none'; emptyState.style.display='block'; return; }
  emptyState.style.display='none'; topCard.style.display='block'; taskSection.style.display='block';
  document.getElementById('topTaskName').textContent = tasks[0].name;
  document.getElementById('topTaskReason').textContent = tasks[0].reason;
  taskList.innerHTML = tasks.map((t,i) => `
    <div class="task-item${i===0?' rank-1':''}" style="animation-delay:${i*0.04}s">
      <div class="task-main" onclick="toggleExpand('${t.id}')">
        <span class="task-num">${String(i+1).padStart(2,'0')}</span>
        <div class="task-body">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-bars">
            <div class="bar-group"><span class="bar-label">U</span><div class="mini-bar"><div class="mini-fill fill-u" style="width:${t.urgency}%"></div></div></div>
            <div class="bar-group"><span class="bar-label">I</span><div class="mini-bar"><div class="mini-fill fill-i" style="width:${t.impact}%"></div></div></div>
            <div class="bar-group"><span class="bar-label">E</span><div class="mini-bar"><div class="mini-fill fill-e" style="width:${t.effort}%"></div></div></div>
          </div>
        </div>
        <span class="task-score">${Math.round(t.priority_score)}</span>
        <div class="task-actions">
          <button class="expand-btn" onclick="event.stopPropagation();toggleExpand('${t.id}')">Details</button>
          <button class="open-btn" onclick="event.stopPropagation();openTaskPage('${t.id}')">Open ↗</button>
          <button class="task-del" onclick="deleteTask('${t.id}',event)">×</button>
        </div>
      </div>
      <div class="task-expand" id="expand-${t.id}"></div>
    </div>`).join('');
}

// ── TASK PAGE ──
function openTaskPage(taskId) {
  document.getElementById('taskView').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderTaskPage(taskId);
  window.scrollTo(0,0);
}

function closeTaskPage() {
  document.getElementById('taskView').style.display = 'none';
  document.body.style.overflow = '';
}

function renderTaskPage(taskId) {
  const p = getProject();
  const tasks = p?.tasks || [];
  const t = tasks.find(t => t.id === taskId) || tasks[0];
  if (!t) return;

  const sidebar = document.getElementById('tpSidebar');
  sidebar.innerHTML = `<div class="tp-sidebar-label">// ${esc(p.name)}</div>` +
    tasks.map(task => `
      <div class="tp-task-item${task.id===t.id?' active':''}" onclick="renderTaskPage('${task.id}')">
        <span class="tp-task-item-num">${String(tasks.indexOf(task)+1).padStart(2,'0')}</span>
        <span class="tp-task-item-name">${esc(task.name)}</span>
        <span class="tp-task-item-score">${Math.round(task.priority_score)}</span>
      </div>`).join('');

  const main = document.getElementById('tpMain');
  const cached = loadCached(t.name);
  main.innerHTML = `
    <div class="tp-task-title-row">
      <div class="tp-eyebrow"><span class="pulse"></span> Task ${String(tasks.indexOf(t)+1).padStart(2,'0')} of ${tasks.length}</div>
      <div class="tp-task-title">${esc(t.name)}</div>
      <div class="tp-badges">
        <div class="tp-badge">Priority <span>${Math.round(t.priority_score)}</span></div>
        <div class="tp-badge">Urgency <span>${t.urgency}</span></div>
        <div class="tp-badge">Impact <span>${t.impact}</span></div>
        <div class="tp-badge">Effort <span>${t.effort}</span></div>
        ${cached ? `<div class="tp-badge cached-badge" onclick="regenTask('${t.id}')">✦ cached · regenerate</div>` : ''}
      </div>
    </div>
    <div class="tp-card" id="progressCard">
      <div class="tp-card-label">Progress</div>
      <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 of 0 complete</div>
    </div>
    <div class="tp-card" id="mainContent">
      <div class="tp-loading"><span class="spinner"></span> Checking context…</div>
    </div>
    <div class="tp-card" id="planCard">
      <div class="tp-card-label">Action plan</div>
      <div class="tp-loading"><span class="spinner"></span> Generating plan…</div>
    </div>`;

  if (cached) renderTaskContent(t, cached);
  else checkContextThenLoad(t);
}

function regenTask(taskId) {
  const t = getProject()?.tasks.find(t => t.id === taskId);
  if (t) { clearCache(t.name); renderTaskPage(taskId); }
}

async function checkContextThenLoad(t) {
  try {
    const mode = getProject()?.mode || 'life';
    const prompt = `Task: "${t.name}" (mode: ${mode})
Does this task have enough context to build a specific action plan and checklist? 
Vague = needs more info (e.g. "study", "do work"). Specific = proceed (e.g. "Study for AP Calc test Friday").
Return ONLY valid JSON, no markdown:
{"has_context":true,"questions":[{"text":"question","options":["A","B","C","Other"]}]}
If has_context true, empty questions array. If false, 2-3 questions with 3-4 options each, always include "Other" as last option.`;
    const text = await callAI(prompt, 800);
    const d = JSON.parse(text.replace(/```json|```/g,'').trim());
    if (d.has_context) renderFullPage(t, '');
    else renderContextQuestions(t, d.questions);
  } catch(e) { renderFullPage(t, ''); }
}

function renderContextQuestions(t, questions) {
  const card = document.getElementById('mainContent');
  const answers = {}, otherText = {};
  function isOther(v) { return v && v.toLowerCase() === 'other'; }
  function allAnswered() { return questions.every((_,i) => answers[i] && (!isOther(answers[i]) || otherText[i]?.trim())); }
  function buildUI() {
    card.innerHTML = `
      <div class="tp-card-label">Before we build your plan</div>
      <div class="ctx-wrap">
        <p class="ctx-intro">A few quick questions to tailor everything for you.</p>
        ${questions.map((q,qi) => `
          <div>
            <div class="ctx-q-label">Question ${qi+1}</div>
            <div class="ctx-q-text">${esc(q.text)}</div>
            <div class="ctx-options">${q.options.map(opt=>`
              <div class="ctx-option${answers[qi]===opt?' selected':''}" onclick="selectOpt(${qi},'${opt.replace(/'/g,"\\'")}')">
                ${esc(opt)}</div>`).join('')}</div>
            ${isOther(answers[qi])?`<input class="ctx-other-input" id="oi-${qi}" type="text"
              placeholder="Tell us what you're thinking…" value="${esc(otherText[qi]||'')}"
              oninput="setOther(${qi},this.value)" onkeydown="if(event.key==='Enter')trySubmit()"/>`:''}</div>`).join('')}
        <button class="btn-primary" id="ctxBtn" onclick="doSubmit()"
          style="${allAnswered()?'':'opacity:0.4;pointer-events:none'}">Build my plan ↗</button>
      </div>`;
    const fi = questions.findIndex((_,i)=>isOther(answers[i]));
    if (fi!==-1) { const inp=document.getElementById(`oi-${fi}`); if(inp) inp.focus(); }
  }
  window.selectOpt=(qi,val)=>{ answers[qi]=val; if(!isOther(val)) delete otherText[qi]; buildUI(); };
  window.setOther=(qi,val)=>{ otherText[qi]=val; const b=document.getElementById('ctxBtn'); if(b){const ok=allAnswered();b.style.opacity=ok?'1':'0.4';b.style.pointerEvents=ok?'auto':'none';} };
  window.trySubmit=()=>{ if(allAnswered()) doSubmit(); };
  window.doSubmit=()=>{
    const ctx=questions.map((q,i)=>`${q.text}: ${isOther(answers[i])?'Other: '+otherText[i]:answers[i]}`).join(' | ');
    renderFullPage(t, ctx);
  };
  buildUI();
}

async function renderFullPage(t, extraContext) {
  const cached = loadCached(t.name);
  const data = cached || await generateContent(t, extraContext);
  if (data) renderTaskContent(t, data);
}

async function generateContent(t, extraContext) {
  try {
    const mode = getProject()?.mode || 'life';
    const ctxLine = extraContext ? `\nUser context: ${extraContext}` : '';
    const prompt = `Task: "${t.name}" (mode: ${mode})${ctxLine}
Generate a tailored task intelligence package. Return ONLY valid JSON, no markdown:
{"time_estimate":"e.g. 3h","schedule":"scheduling tip","checklist":[{"text":"item 1"},{"text":"item 2"},{"text":"item 3"},{"text":"item 4"},{"text":"item 5"}],"plan_steps":[{"title":"Step","desc":"detail","time":"20 min"},{"title":"Step","desc":"detail","time":"30 min"},{"title":"Step","desc":"detail","time":"25 min"},{"title":"Step","desc":"detail","time":"15 min"}]}`;
    const text = await callAI(prompt, 1400);
    const d = JSON.parse(text.replace(/```json|```/g,'').trim());
    saveCache(t.name, d);
    return d;
  } catch(e) { return null; }
}

function renderTaskContent(t, d) {
  let checkStates = d.checklist.map(() => false);

  function updateProgress() {
    const done = checkStates.filter(Boolean).length;
    const total = checkStates.length;
    const pct = total ? Math.round((done/total)*100) : 0;
    const fill = document.getElementById('progressFill');
    const txt = document.getElementById('progressText');
    if (fill) fill.style.width = pct + '%';
    if (txt) txt.textContent = `${done} of ${total} complete — ${pct}%`;
  }

  function renderChecklist() {
    const card = document.getElementById('mainContent');
    if (!card) return;
    card.innerHTML = `
      <div class="tp-card-label">Action checklist</div>
      <div class="tp-badge" style="margin-bottom:14px;display:inline-flex;border-color:var(--mode-border);color:var(--mode-color);">⏱ ${esc(d.time_estimate)} · ${esc(d.schedule)}</div>
      <div class="checklist">
        ${d.checklist.map((item,ci)=>`
          <div class="check-item${checkStates[ci]?' done':''}" onclick="toggleChk(${ci})" id="chk-${ci}">
            <div class="check-box"><span class="check-tick">✓</span></div>
            <div class="check-text">${esc(item.text)}</div>
          </div>`).join('')}
      </div>
      <div class="add-check">
        <input type="text" id="newChkInput" placeholder="Add a step…" onkeydown="if(event.key==='Enter')addChk()"/>
        <button class="add-check-btn" onclick="addChk()">Add</button>
      </div>`;
    updateProgress();
  }

  window.toggleChk = (ci) => {
    checkStates[ci] = !checkStates[ci];
    document.getElementById(`chk-${ci}`)?.classList.toggle('done', checkStates[ci]);
    updateProgress();
  };
  window.addChk = () => {
    const inp = document.getElementById('newChkInput');
    if (!inp?.value.trim()) return;
    d.checklist.push({ text: inp.value.trim() });
    checkStates.push(false);
    inp.value = '';
    renderChecklist();
  };

  renderChecklist();

  const planCard = document.getElementById('planCard');
  if (planCard) planCard.innerHTML = `
    <div class="tp-card-label">Action plan & schedule</div>
    <div class="plan-steps">
      ${d.plan_steps.map((s,si)=>`
        <div class="plan-step">
          <div class="step-num">${si+1}</div>
          <div>
            <div class="step-title">${esc(s.title)}</div>
            <div class="step-desc">${esc(s.desc)}</div>
            <div class="step-time">⏱ ${esc(s.time)}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── INIT ──
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTasks(); }
});

loadState();
const p = getProject();
applyMode(p?.mode || 'life');
document.getElementById('topbarProject').textContent = p?.name || '';
renderSidebar();
render();
</script>
